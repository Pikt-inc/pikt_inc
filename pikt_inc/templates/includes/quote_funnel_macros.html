{% from "pikt_inc/templates/includes/site_shell_macros.html" import site_shell_head %}

{% macro quote_funnel_head(noindex_meta=1) -%}
{{ site_shell_head(noindex_meta) }}
<style>
.quote-flow-page{background:#fff;color:#171717;min-height:100vh}
.quote-flow-wrap{max-width:1200px;margin:0 auto;padding:0 20px 64px}
.quote-flow-hero{padding:56px 0 28px}
.quote-flow-kicker{margin:0 0 14px;color:#0f5132;font-size:13px;font-weight:700;letter-spacing:.08em;line-height:1.2;text-transform:uppercase}
.quote-flow-title{margin:0;max-width:860px;color:#171717;font-size:clamp(2.4rem,5vw,4.4rem);font-weight:700;line-height:1.03;letter-spacing:-.03em}
.quote-flow-copy{margin:18px 0 0;max-width:820px;color:#525252;font-size:17px;font-weight:500;line-height:1.68}
.quote-flow-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:24px}
.quote-flow-btn{display:inline-flex;align-items:center;justify-content:center;min-height:50px;padding:0 20px;border-radius:16px;font-size:15px;font-weight:700;line-height:1.1;text-decoration:none}
.quote-flow-btn--primary{background:#171717;color:#fff}
.quote-flow-btn--secondary{background:#f3f3f3;color:#171717}
.quote-flow-grid{display:grid;gap:24px}
.quote-flow-grid--two{grid-template-columns:minmax(0,1.1fr) minmax(0,.9fr)}
.quote-flow-grid--three{grid-template-columns:repeat(3,minmax(0,1fr))}
.quote-flow-card{background:#fff;border:1px solid #e7e7e7;border-radius:28px;padding:26px}
.quote-flow-card h2,.quote-flow-card h3{margin:0;color:#171717;font-weight:700}
.quote-flow-card h2{font-size:30px;line-height:1.15}
.quote-flow-card h3{font-size:21px;line-height:1.2}
.quote-flow-card p,.quote-flow-card li{margin:12px 0 0;color:#525252;font-size:15px;line-height:1.65}
.quote-flow-card ul{margin:16px 0 0;padding-left:18px}
.quote-flow-card li+li{margin-top:8px}
.quote-flow-card--dark{background:#103223;border-color:#103223}
.quote-flow-card--dark h2,.quote-flow-card--dark h3,.quote-flow-card--dark p,.quote-flow-card--dark li,.quote-flow-card--dark strong{color:#fff}
.quote-flow-card--dark .quote-flow-kicker{color:#9fe3b7}
.quote-flow-card-copy{margin:12px 0 0;color:#525252;font-size:16px;line-height:1.65}
.quote-flow-step-list{display:grid;gap:14px}
.quote-flow-step{display:grid;grid-template-columns:40px minmax(0,1fr);gap:14px;align-items:flex-start}
.quote-flow-step__badge{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:999px;background:#f3f3f3;color:#171717;font-size:14px;font-weight:700}
.quote-flow-note-list{display:grid;gap:10px;margin-top:16px}
.quote-flow-note{border:1px solid #ececec;border-radius:18px;background:#fafafa;padding:14px 16px;color:#374151;font-size:14px;line-height:1.6}
.quote-flow-upload-panel{min-height:220px}
@media (max-width:980px){
  .quote-flow-grid--two,.quote-flow-grid--three{grid-template-columns:1fr}
}
@media (max-width:768px){
  .quote-flow-wrap{padding:0 16px 48px}
  .quote-flow-hero{padding:44px 0 22px}
  .quote-flow-card{padding:20px}
}
</style>
{%- endmacro %}
