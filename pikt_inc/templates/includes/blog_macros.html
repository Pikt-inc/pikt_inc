{% from "pikt_inc/templates/includes/site_shell_macros.html" import site_shell_head %}

{% macro blog_head(rss_url, structured_data_json="", noindex_meta=0) -%}
{{ site_shell_head(noindex_meta) }}
<style>
.blog-page{background:#fff;color:#171717;min-height:100vh}
.blog-page a{text-decoration:none}
.blog-page a:hover{text-decoration:none}
.blog-wrap{max-width:1200px;margin:0 auto;padding:0 20px}
.blog-hero{padding:72px 0 32px}
.blog-hero h1,.blog-article h1{margin:0 0 14px;color:#171717;font-size:clamp(2.3rem,5vw,4.4rem);font-weight:700;line-height:1.05;max-width:900px}
.blog-note{margin:0 0 14px;color:#0f5132;font-size:13px;font-weight:700;letter-spacing:.08em;line-height:1.2;text-transform:uppercase}
.blog-copy{max-width:760px;color:#525252;font-size:16px;font-weight:500;line-height:1.6}
.blog-tools{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
.blog-tool-link,.blog-chip,.blog-page-link{display:inline-flex;align-items:center;justify-content:center;border:1px solid #e7e7e7;border-radius:999px;background:#fff;color:#171717;font-size:14px;font-weight:600;padding:10px 16px}
.blog-chip.active,.blog-page-link.active{background:#171717;border-color:#171717;color:#fff}
.blog-chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
.blog-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:22px;padding:28px 0 56px}
.blog-card{display:flex;flex-direction:column;background:#fff;border:1px solid #e7e7e7;border-radius:24px;overflow:hidden}
.blog-card img{display:block;width:100%;height:220px;object-fit:cover;background:#f3f3f3}
.blog-card__body{display:flex;flex:1;flex-direction:column;padding:22px}
.blog-card__body h2{margin:12px 0 10px;color:#171717;font-size:28px;font-weight:700;line-height:1.15}
.blog-card__body p,.blog-empty,.blog-richtext,.blog-aside p{color:#525252;font-size:16px;line-height:1.65}
.blog-meta{display:flex;flex-wrap:wrap;gap:10px;color:#0f5132;font-size:12px;font-weight:700;letter-spacing:.08em;line-height:1.2;text-transform:uppercase}
.blog-read-link,.blog-inline-link{color:#171717;font-size:15px;font-weight:600}
.blog-empty{background:#f7f9fc;border:1px solid #e7e7e7;border-radius:24px;padding:28px}
.blog-empty h2{margin:0 0 12px;color:#171717;font-size:28px;font-weight:700;line-height:1.2}
.blog-pagination{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding-bottom:64px}
.blog-article{padding:52px 0 24px}
.blog-article-grid{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:22px;padding-bottom:56px}
.blog-content,.blog-aside{background:#fff;border:1px solid #e7e7e7;border-radius:24px}
.blog-content{padding:28px}
.blog-content img{max-width:100%;height:auto;border-radius:18px}
.blog-richtext{line-height:1.8}
.blog-richtext h2,.blog-richtext h3,.blog-richtext h4{color:#171717;font-size:28px;font-weight:700;line-height:1.2;margin:30px 0 14px}
.blog-richtext h3{font-size:24px}
.blog-richtext h4{font-size:20px}
.blog-aside{padding:24px}
.blog-aside h3{margin:0 0 16px;color:#171717;font-size:22px;font-weight:700;line-height:1.2}
.blog-aside ul{margin:0;padding-left:18px}
.blog-aside li+li{margin-top:10px}
.blog-adjacent{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:28px}
.blog-adjacent a{display:block;background:#f7f9fc;border:1px solid #e7e7e7;border-radius:18px;color:#171717;padding:16px}
@media (max-width:980px){
  .blog-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .blog-article-grid{grid-template-columns:1fr}
}
@media (max-width:768px){
  .blog-wrap{padding-left:16px;padding-right:16px}
  .blog-hero{padding:52px 0 24px}
  .blog-grid{grid-template-columns:1fr}
  .blog-adjacent{grid-template-columns:1fr}
}
</style>
<link rel="alternate" type="application/rss+xml" title="Pikt Blog RSS" href="{{ rss_url }}">
{% if structured_data_json %}<script type="application/ld+json">{{ structured_data_json | safe }}</script>{% endif %}
{%- endmacro %}
