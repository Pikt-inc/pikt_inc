name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: self-hosted

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install ruff

      - name: Compile Python sources
        run: python -m compileall pikt_inc

      - name: Ruff check
        run: ruff check .

      - name: Run unit tests
        run: python -m unittest discover -s pikt_inc/tests -p "test_*.py"
