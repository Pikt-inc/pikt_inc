name: UTF-8 Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  utf8-validation:
    runs-on: self-hosted

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Validate tracked text files are UTF-8 without BOM
        run: python scripts/check_utf8.py

